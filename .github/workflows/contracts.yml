name: Contract Checks

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  contract-tests:
    name: CLI and MCP Contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run contract tests
        run: |
          set -euo pipefail
          go test ./internal/cli ./internal/mcp -run Contract -count=1
