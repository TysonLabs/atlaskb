services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: atlaskb
      POSTGRES_USER: atlaskb
      POSTGRES_PASSWORD: atlaskb
    volumes:
      - atlaskb-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlaskb -d atlaskb"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  atlaskb:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${ATLASKB_VERSION:-dev}
        COMMIT: ${ATLASKB_COMMIT:-none}
        DATE: ${ATLASKB_BUILD_DATE:-unknown}
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${ATLASKB_PORT:-3000}:3000"
    volumes:
      - atlaskb-home:/root/.atlaskb
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    command: ["serve", "--port", "3000"]

volumes:
  atlaskb-postgres:
  atlaskb-home:
